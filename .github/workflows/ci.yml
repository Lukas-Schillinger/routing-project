name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting & lint
        run: npm run lint

      - name: Run type check
        run: npm run check
        env:
          # Database
          DATABASE_URL: "postgres://user:pass@localhost:5432/db"
          # Email (Resend)
          RESEND_API_KEY: "re_placeholder"
          EMAIL_FROM: "noreply@example.com"
          RESEND_WEBHOOK_SECRET: "placeholder"
          # Render
          RENDER_SERVICE_URL: "https://placeholder.render.com"
          RENDER_TOKEN_WEND: "placeholder"
          # Mapbox
          MAPBOX_ACCESS_TOKEN: "pk.placeholder"
          PUBLIC_MAPBOX_STATIC_MAP_TOKEN: "pk.placeholder"
          PUBLIC_MAPTILER_KEY: "placeholder"
          # Cloudflare R2
          CLOUDFLARE_ACCOUNT_ID: "placeholder"
          CLOUDFLARE_R2_ACCESS_KEY_ID: "placeholder"
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: "placeholder"
          CLOUDFLARE_R2_DEV_BUCKET_NAME: "placeholder"
          # AWS (SQS)
          AWS_REGION: "us-east-1"
          AWS_ACCESS_KEY_ID: "placeholder"
          AWS_SECRET_ACCESS_KEY: "placeholder"
          OPTIMIZATION_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/placeholder"
          OPTIMIZATION_WEBHOOK_SECRET: "placeholder"
          # Stripe
          STRIPE_SECRET_KEY: "sk_placeholder"
          STRIPE_FREE_PLAN_PRICE_ID: "price_placeholder"
          STRIPE_PRO_PLAN_PRICE_ID: "price_placeholder"
          STRIPE_CREDIT_PRICE_ID: "price_placeholder"
          STRIPE_WEBHOOK_SECRET: "placeholder"
          # Upstash (Rate limiting)
          UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "placeholder"
          # Cloudflare R2 (public)
          PUBLIC_CLOUDFLARE_R2_BUCKET_NAME: "placeholder"
          PUBLIC_CLOUDFLARE_R2_URL: "https://placeholder.r2.dev"

  test:
    name: Unit & Integration Tests
    needs: check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Push schema to test database
        run: npx drizzle-kit push --force
        env:
          DATABASE_URL: "postgres://test:test@localhost:5432/test_db"

      - name: Run unit & integration tests
        run: npm run test:unit
        env:
          DATABASE_URL: "postgres://test:test@localhost:5432/test_db"
          # Email (Resend)
          RESEND_API_KEY: "re_placeholder"
          EMAIL_FROM: "noreply@example.com"
          RESEND_WEBHOOK_SECRET: "placeholder"
          # Render
          RENDER_SERVICE_URL: "https://placeholder.render.com"
          RENDER_TOKEN_WEND: "placeholder"
          # Mapbox
          MAPBOX_ACCESS_TOKEN: "pk.placeholder"
          PUBLIC_MAPBOX_STATIC_MAP_TOKEN: "pk.placeholder"
          PUBLIC_MAPTILER_KEY: "placeholder"
          # Cloudflare R2
          CLOUDFLARE_ACCOUNT_ID: "placeholder"
          CLOUDFLARE_R2_ACCESS_KEY_ID: "placeholder"
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: "placeholder"
          CLOUDFLARE_R2_DEV_BUCKET_NAME: "placeholder"
          # AWS (SQS)
          AWS_REGION: "us-east-1"
          AWS_ACCESS_KEY_ID: "placeholder"
          AWS_SECRET_ACCESS_KEY: "placeholder"
          OPTIMIZATION_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/placeholder"
          OPTIMIZATION_WEBHOOK_SECRET: "placeholder"
          # Stripe
          STRIPE_SECRET_KEY: "sk_placeholder"
          STRIPE_FREE_PLAN_PRICE_ID: "price_placeholder"
          STRIPE_PRO_PLAN_PRICE_ID: "price_placeholder"
          STRIPE_CREDIT_PRICE_ID: "price_placeholder"
          STRIPE_WEBHOOK_SECRET: "placeholder"
          # Upstash (Rate limiting)
          UPSTASH_REDIS_REST_URL: "https://placeholder.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "placeholder"
          # Cloudflare R2 (public)
          PUBLIC_CLOUDFLARE_R2_BUCKET_NAME: "placeholder"
          PUBLIC_CLOUDFLARE_R2_URL: "https://placeholder.r2.dev"
